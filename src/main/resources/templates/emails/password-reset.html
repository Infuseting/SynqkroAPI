<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{emails/base :: layout(~{::content})}">

<head>
    <title>Password Reset</title>
</head>

<body>
    <div th:fragment="content">
        <!-- Icon -->
        <div style="text-align: center; margin-bottom: 32px;">
            <div
                style="display: inline-block; width: 80px; height: 80px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 50%;">
                <span style="font-size: 40px; line-height: 80px;">🔑</span>
            </div>
        </div>

        <!-- Title -->
        <h2 style="margin: 0 0 16px; color: #212529; font-size: 24px; font-weight: 700; text-align: center;">
            Réinitialisation de mot de passe
        </h2>

        <p style="margin: 0 0 24px; color: #6c757d; font-size: 16px; line-height: 1.6; text-align: center;">
            Bonjour <strong th:text="${username}">User</strong>,<br>
            Vous avez demandé à réinitialiser votre mot de passe.
        </p>

        <!-- CTA Button -->
        <div style="text-align: center; margin: 32px 0;">
            <a th:href="${resetUrl}"
                style="display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: #ffffff; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: 600; box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);">
                Réinitialiser mon mot de passe
            </a>
        </div>

        <!-- Warning Box -->
        <div
            style="background-color: #fff3cd; border-left: 4px solid #ffc107; border-radius: 8px; padding: 16px; margin: 24px 0;">
            <p style="margin: 0; color: #856404; font-size: 14px; line-height: 1.5;">
                ⚠️ <strong>Important :</strong> Ce lien expire dans <span th:text="${expiresIn}">15 minutes</span>.
            </p>
        </div>

        <p style="margin: 24px 0 0; color: #6c757d; font-size: 14px; line-height: 1.5; text-align: center;">
            Si vous n'êtes pas à l'origine de cette demande, vous pouvez ignorer cet email en toute sécurité.
        </p>
    </div>
</body>

</html>
