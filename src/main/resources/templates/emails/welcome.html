<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{emails/base :: layout(~{::content})}">

<head>
    <title>Welcome</title>
</head>

<body>
    <div th:fragment="content">
        <!-- Welcome Icon -->
        <div style="text-align: center; margin-bottom: 32px;">
            <div
                style="display: inline-block; width: 80px; height: 80px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                <span style="font-size: 40px;">👋</span>
            </div>
        </div>

        <!-- Greeting -->
        <h2 style="margin: 0 0 16px; color: #212529; font-size: 24px; font-weight: 700; text-align: center;">
            Bienvenue, <span th:text="${username}">User</span> !
        </h2>

        <p style="margin: 0 0 24px; color: #6c757d; font-size: 16px; line-height: 1.6; text-align: center;">
            Nous sommes ravis de vous accueillir sur <span th:text="${appName}">Synqkro</span> ! 🎉
        </p>

        <!-- Features -->
        <div style="background-color: #f8f9fa; border-radius: 12px; padding: 24px; margin: 24px 0;">
            <h3 style="margin: 0 0 16px; color: #212529; font-size: 18px; font-weight: 600;">
                Que faire ensuite ?
            </h3>
            <ul style="margin: 0; padding-left: 20px; color: #495057; font-size: 15px; line-height: 1.8;">
                <li>Confirmez votre adresse email</li>
                <li>Activez l'authentification à deux facteurs (2FA)</li>
                <li>Explorez les fonctionnalités</li>
                <li>Personnalisez votre profil</li>
            </ul>
        </div>

        <!-- CTA Button -->
        <div style="text-align: center; margin: 32px 0;">
            <a th:href="${confirmationUrl}"
                style="display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #ffffff; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: 600; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);">
                Confirmer mon email
            </a>
        </div>

        <p style="margin: 24px 0 0; color: #adb5bd; font-size: 13px; line-height: 1.5; text-align: center;">
            Ce lien expire dans 48 heures.
        </p>
    </div>
</body>

</html>
